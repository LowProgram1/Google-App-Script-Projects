<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  :root {
    --bg-main: #f8fafc;
    --sidebar-bg: #ffffff;
    --primary: #4f46e5;
    --accent: #10b981;
    --text-dark: #1e293b;
    --text-muted: #64748b;
    --border-color: #e2e8f0;
    --navbar-height: 64px;
  }

  html, body { height: 100%; }

  body {
    font-family: 'Inter', sans-serif;
    background-color: var(--bg-main);
    color: var(--text-dark);
    margin: 0;
    overflow-x: hidden;
  }

  /* --- Navigation --- */
  .navbar {
    background: rgba(255, 255, 255, 0.8) !important;
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border-color);
    padding: 0.75rem 1.5rem;
    z-index: 1030;
    min-height: var(--navbar-height);
  }
  .navbar .navbar-brand-text {
    display: block;
    line-height: 1.25;
  }
  .navbar .navbar-brand-line1 {
    display: block;
    font-weight: 700;
    font-size: 1.05em;
    letter-spacing: -0.01em;
  }
  .navbar .navbar-brand-line2 {
    display: block;
    font-weight: 500;
    font-size: 0.88em;
    color: var(--text-muted);
    margin-top: 0.05rem;
  }
  #user-display {
    max-width: 220px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  @media (min-width: 992px) {
    #user-display { max-width: 320px; }
  }

  .sidebar {
    background-color: var(--sidebar-bg);
    border-right: 1px solid var(--border-color);
    height: 100vh;
    padding-top: 1.5rem;
    position: sticky;
    top: 0;
    z-index: 1000;
    transition: flex-basis 0.2s ease, max-width 0.2s ease;
  }

  .sidebar .nav-link i {
    font-size: 1rem;
  }

  .sidebar .sidebar-label {
    white-space: nowrap;
  }

  /* Desktop / tablet collapsed sidebar */
  @media (min-width: 768px) {
    body.sidebar-collapsed #sidebarMenu {
      flex: 0 0 72px;
      max-width: 72px;
    }

    body.sidebar-collapsed #sidebarMenu .sidebar-label {
      display: none;
    }

    body.sidebar-collapsed #sidebarMenu .nav-link {
      justify-content: center;
      padding-left: 0.8rem;
      padding-right: 0.8rem;
    }

    /* Make main content follow the collapsed sidebar width */
    body.sidebar-collapsed main.main-content {
      flex: 1 1 auto;
      max-width: calc(100% - 72px);
    }
  }

  .nav-link {
    color: var(--text-muted) !important;
    font-weight: 500;
    padding: 0.8rem 1.2rem;
    margin: 0.2rem 1rem;
    border-radius: 10px;
    display: flex;
    align-items: center;
    transition: all 0.2s ease;
  }

  .nav-link:hover, .nav-link.active {
    background-color: #eef2ff;
    color: var(--primary) !important;
  }

  /* --- Layout & Cards --- */
  .main-content { padding: 2rem; }

  .glass-card {
    background: #ffffff;
    border: 1px solid var(--border-color);
    border-radius: 16px;
    padding: 1.5rem;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
  }

  /* Page titles */
  .page-title {
    font-size: 1.75rem;
  }

  @media (max-width: 576px) {
    .page-title {
      font-size: 1.4rem;
    }
  }

  /* Tracker header: single row on desktop, stacked + centered icon buttons on mobile */
  .tracker-header .tracker-title {
    white-space: nowrap;
  }
  @media (min-width: 768px) {
    .tracker-header {
      flex-wrap: nowrap;
    }
    .tracker-header .tracker-actions {
      flex-wrap: nowrap;
    }
  }
  @media (max-width: 767.98px) {
    .tracker-header .tracker-title {
      white-space: normal;
      word-break: break-word;
    }
    .tracker-header .tracker-actions {
      width: 100%;
    }
    .tracker-header .tracker-btn {
      padding-left: 1rem;
      padding-right: 1rem;
    }
  }

  /* --- Category collapsible containers --- */
  .category-container-card {
    border: 1px solid var(--border-color);
    border-radius: 16px;
    overflow: hidden;
    background: #fff;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
  }
  .category-container-card .category-container-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem 1rem;
    background: #f8fafc;
    border-bottom: 1px solid var(--border-color);
    cursor: pointer;
    user-select: none;
  }
  .category-container-card .category-container-header:hover {
    background: #f1f5f9;
  }
  .category-container-card .category-collapse-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 2.25rem;
    height: 2.25rem;
    padding: 0;
    border: 1px solid var(--border-color);
    background: #fff;
    color: var(--text-dark);
    border-radius: 8px;
    flex-shrink: 0;
    font-size: 1.1rem;
  }
  .category-container-card .category-collapse-btn:hover {
    color: var(--primary);
    background: rgba(79, 70, 229, 0.08);
    border-color: var(--primary);
  }
  /* Expanded: show chevron-up (collapse), hide chevron-down */
  .category-container-card .category-container-header[aria-expanded="true"] .category-collapse-icon-expanded { display: inline-block !important; visibility: visible !important; }
  .category-container-card .category-container-header[aria-expanded="true"] .category-collapse-icon-collapsed { display: none !important; }
  /* Collapsed: show chevron-down (expand) so it's clear you can maximize */
  .category-container-card .category-container-header[aria-expanded="false"] .category-collapse-icon-expanded { display: none !important; }
  .category-container-card .category-container-header[aria-expanded="false"] .category-collapse-icon-collapsed { display: inline-block !important; visibility: visible !important; color: var(--primary); font-size: 1.15rem; }
  .category-container-card .category-container-header[aria-expanded="false"] .category-collapse-btn:hover .category-collapse-icon-collapsed { color: var(--primary); }

  /* --- DataTables Modernization --- */
  
  /* Container spacing */
  .dataTables_wrapper { padding: 0; }

  .dataTables_wrapper .d-flex {
    padding: 10px 15px;
  }

  /* Search & Length Layout */
  .dataTables_filter input {
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 6px 12px;
    outline: none;
    transition: all 0.2s;
    background: #f8fafc;
  }

  .dataTables_filter input:focus {
    border-color: var(--primary);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
  }

  .dataTables_length select {
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 5px 10px;
    background: #f8fafc;
  }

  /* Table Specifics */
  table.dataTable {
    border-collapse: collapse !important;
    margin-top: 20px !important;
    margin-bottom: 20px !important;
  }

  table.dataTable thead th {
    background-color: #1e293b !important; /* Deep Slate/Navy */
    color: #ffffff !important;           /* White text for contrast */
    font-weight: 600;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 5px 12px !important;       /* Better vertical/horizontal padding */
    border-bottom: none !important;
    vertical-align: middle;
    text-align: left !important;        /* Match body cells so headers align with data */
  }

  /* 2. Style the Data Rows */
  table.dataTable tbody td {
    padding: 8px 12px !important;       /* Standardized cell padding */
    color: #334155;                      /* Darker text for readability */
    border-bottom: 1px solid #f1f5f9;
    background-color: #ffffff;
    font-size: 0.85rem;
    vertical-align: middle;
    text-align: left !important;         /* Align with headers */
  }

  /* Center-aligned columns: header and cell must match */
  table.dataTable thead th.text-center,
  table.dataTable tbody td.text-center {
    text-align: center !important;
  }

  table.dataTable tbody td.dtfc-fixed-right {
  min-width: 120px !important;
  background-color: #ffffff !important;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 5px; /* Space between icons */
}

/* Optional: Make icons slightly more vibrant on hover */
.btn-outline-danger:hover { background-color: #dc3545; color: white; }
.btn-outline-warning:hover { background-color: #ffc107; color: #212529; }

  /* 3. Darken Zebra Striping for better structure */
  table.dataTable.stripe tbody tr.odd, 
  table.dataTable.display tbody tr.odd {
    background-color: #f8fafc !important;
  }

  /* Fixed Column - Essential Fix (body cells) */
  .dtfc-fixed-right {
    background-color: #ffffff !important;
    border-left: 2px solid #e2e8f0 !important;
    position: sticky !important;
    right: 0 !important;
    z-index: 2 !important;
  }

  /* Ensure header scrolls with body so sticky Action header has a scroll container */
  .dataTables_wrapper .dataTables_scrollHead {
    overflow-x: auto !important;
    overflow-y: hidden !important;
    scrollbar-width: none !important;
    -ms-overflow-style: none !important;
  }
  .dataTables_wrapper .dataTables_scrollHead::-webkit-scrollbar {
    display: none !important;
  }
  .dataTables_wrapper .dataTables_scrollHead .dataTables_scrollHeadInner {
    overflow: visible !important;
  }

  /* Tracker: freeze Action column + header — sticky so header stays on the right */
  #trackerTable thead th.dtfc-fixed-right,
  #trackerTable thead th:last-child {
    position: sticky !important;
    right: 0 !important;
    z-index: 15 !important;
    background: #1e293b !important;
    color: #ffffff !important;
    border-left: 2px solid #475569 !important;
    box-shadow: -4px 0 8px rgba(0,0,0,0.12);
  }
  .dataTables_scrollHead #trackerTable thead th:last-child,
  .dataTables_scrollHead #trackerTable thead th.dtfc-fixed-right,
  .dataTables_scrollHead .dataTables_scrollHeadInner table thead th.dtfc-fixed-right,
  .dataTables_scrollHead .dataTables_scrollHeadInner table thead th:last-child {
    position: sticky !important;
    right: 0 !important;
    z-index: 15 !important;
    background: #1e293b !important;
    color: #ffffff !important;
    border-left: 2px solid #475569 !important;
    box-shadow: -4px 0 8px rgba(0,0,0,0.12);
  }
  table.dataTable thead tr > th.dtfc-fixed-right {
    position: sticky !important;
    right: 0 !important;
    z-index: 15 !important;
    background: #1e293b !important;
    color: #ffffff !important;
  }

  /* 5. Darken Search and Length Controls */
  .dataTables_length label, 
  .dataTables_filter label {
    font-weight: 600;
    color: #1e293b;
    margin-bottom: 10px;
  }

  /* Custom Scrollbar */
  .dataTables_scrollBody::-webkit-scrollbar { height: 6px; width: 6px; }
  .dataTables_scrollBody::-webkit-scrollbar-track { background: transparent; }
  .dataTables_scrollBody::-webkit-scrollbar-thumb {
    background: #cbd5e1;
    border-radius: 10px;
  }
  .dataTables_scrollBody::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

  /* Pagination Styling */
  .page-item.active .page-link {
    background-color: var(--primary) !important;
    border-color: var(--primary) !important;
    color: #fff !important;
  }
  
  .page-link {
    color: var(--text-muted);
    border-radius: 8px !important;
    margin: 0 2px;
  }

  /* Mobile sidebar overlay behavior */
  @media (max-width: 767.98px) {
    #sidebarMenu {
      position: fixed;
      top: var(--navbar-height);
      left: 0;
      height: calc(100vh - var(--navbar-height));
      width: min(85vw, 320px);
      z-index: 1040;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.2);
      overflow-y: auto;
    }

    .main-content {
      padding: 1rem;
    }

    .glass-card {
      padding: 1rem;
      border-radius: 12px;
    }

    /* Keep DataTables controls from overflowing on narrow screens */
    .dataTables_wrapper .d-flex {
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .dataTables_filter,
    .dataTables_length {
      width: 100%;
    }
    .dataTables_filter label,
    .dataTables_length label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      width: 100%;
      margin-bottom: 0;
    }
    .dataTables_filter input,
    .dataTables_length select {
      width: auto;
      flex: 1 1 auto;
      max-width: 100%;
    }
  }

  /* Smoother horizontal scroll on touch devices (DataTables scrollX) */
  .dataTables_scrollBody {
    -webkit-overflow-scrolling: touch;
  }

  /* --- Image Hover Preview Styles --- */
.image-preview-wrapper {
  position: relative;
  display: inline-block;
}

.preview-popup {
  display: none;
  position: absolute;
  bottom: 125%; /* Position above the button */
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  background: white;
  padding: 5px;
  border-radius: 8px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  border: 1px solid #e2e8f0;
}

.preview-popup img {
  max-width: 150px;
  max-height: 150px;
  display: block;
  border-radius: 4px;
}

/* Show preview on hover */
.image-preview-wrapper:hover .preview-popup {
  display: block;
}

/* Central Loading Overlay */
#loadingOverlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.5);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999; /* Higher than Bootstrap Modals */
  color: white;
  visibility: hidden;
  opacity: 0;
  transition: opacity 0.3s ease;
}

#loadingOverlay.show {
  visibility: visible;
  opacity: 1;
}

/* Form Validation Styling */
.form-control:invalid, .form-select:invalid {
  border-color: #dc3545;
}

/* Fixes the search box jumping to the top of the screen */
.select2-container--open {
    z-index: 9999 !important;
}

.select2-container {
    width: 100% !important;
}

/* Agency Select2 inside modal: keep dropdown in modal flow so it doesn't jump to top on mobile */
.modal .select2-dropdown-in-modal {
  position: absolute !important;
  max-height: min(50vh, 280px);
  overflow-y: auto;
}
.modal .select2-container--open .select2-dropdown {
  position: absolute !important;
}
@media (max-width: 767.98px) {
  .modal .select2-dropdown-in-modal {
    max-height: 40vh;
  }
}
</style>
