<!-- Add Agency modal: included by View.Category.Index -->
<div class="modal fade" id="addAgencyModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content border-0 shadow">
      <div class="modal-header border-0">
        <h5 class="modal-title fw-bold">New Agency</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="addAgencyForm">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Agency Name</label>
              <input type="text" class="form-control" id="newAgencyName" placeholder="Full agency name" required>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Agency Alias</label>
              <input type="text" class="form-control" id="newAgencyAlias" placeholder="e.g. DICT" required>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Sector</label>
              <select class="form-select" id="newAgencySector">
                <option value="" disabled selected>Select Sector...</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Agency Head</label>
              <input type="text" class="form-control" id="newAgencyHead" placeholder="Name of head">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Position</label>
              <input type="text" class="form-control" id="newAgencyPosition" placeholder="e.g. Secretary">
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Agency Email</label>
              <input type="email" class="form-control" id="newAgencyEmail" placeholder="agency@example.gov.ph">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Contact Person</label>
              <input type="text" class="form-control" id="newAgencyContactPerson" placeholder="Name">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Contact Number</label>
              <input type="text" class="form-control" id="newAgencyContactNumber" placeholder="09xxxxxxxxx">
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Contact Email</label>
              <input type="email" class="form-control" id="newAgencyContactEmail" placeholder="contact@example.gov.ph">
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-secondary rounded-pill px-3" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary rounded-pill px-3" id="addAgencySubmitBtn" onclick="submitAddAgency()">Save Agency</button>
      </div>
    </div>
  </div>
</div>
