<div class="modal fade" id="addApplicationModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-scrollable modal-fullscreen-md-down">
    <div class="modal-content border-0 shadow-lg">
      <div class="modal-header bg-primary text-white p-4">
        <h5 class="modal-title fw-bold"><i class="bi bi-file-earmark-plus me-2"></i>New PNPKI Application</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body p-4 bg-light">
        <form id="appForm" class="needs-validation" novalidate>
          
          <div class="alert alert-dark d-flex justify-content-between align-items-center mb-4">
            <div>
              <small class="text-uppercase opacity-75 d-block">Generated Serial Number</small>
              <h4 class="mb-0 fw-bold font-monospace" id="serialPreview">SELECT DOMAIN...</h4>
              <input type="hidden" name="serial" id="hiddenSerial">
            </div>
            <i class="bi bi-cpu-fill fs-2 opacity-25"></i>
          </div>

          <div class="row g-3 mb-4">
            <div class="col-md-4">
              <label class="form-label fw-semibold">Domain</label>
              <select class="form-select border-primary" name="domain" id="domainSelect" onchange="updateProvinces(''); generateSerial('');" required>
                <option value="" selected disabled>Select Region...</option>
                <option value="015">015</option>
                <option value="017">017</option>
              </select>
            </div>

            <div class="col-md-4">
              <label class="form-label fw-semibold">Province</label>
              <select class="form-select" name="province" id="provinceSelect" onchange="updateCities(''); generateSerial('');" required disabled>
                <option value="">Choose Domain First</option>
              </select>
            </div>
                        
            <div class="col-md-4">
              <label class="form-label fw-semibold">Sector</label>
              <select class="form-select" name="sector" id="sectorSelect" onchange="generateSerial(''); updateAgencyDropdown('')" required disabled>
                <option value="" selected disabled>Choose Domain and Province First</option>
              </select>
            </div>
          </div>

          <div class="row g-3 mb-4">
            <div class="col-md-4">
              <label class="form-label fw-semibold">City / Municipality</label>
              <select class="form-select" name="city" id="citySelect" onchange="autoFillDistrict('')" required disabled>
                <option value="">Choose Province First</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Congressional District</label>
              <input type="text" class="form-control bg-white" name="district" id="district" readonly placeholder="Auto-fills...">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Interview Date</label>
              <input type="date" class="form-control" name="interviewDate" required>
            </div>
          </div>

          <div class="row g-3 mb-4">
            <div class="col-md-4">
              <label class="form-label fw-semibold">Last Name</label>
              <input type="text" class="form-control" name="lastName" placeholder="Last name" required>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">First Name</label>
              <input type="text" class="form-control" name="firstName" placeholder="First name" required>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Middle Name</label>
              <input type="text" class="form-control" id="middleName" name="middleName" placeholder="Middle name" required>
              <div class="form-check mt-1">
                <input class="form-check-input" type="checkbox" id="noMiddleName">
                <label class="form-check-label" for="noMiddleName">No Middle Name</label>
              </div>
            </div>
          </div>

          <div class="row g-3 mb-2">
            <div class="col-md-3">
              <label class="form-label fw-semibold">Suffix</label>
              <input type="text" class="form-control" id="suffix" name="suffix" placeholder="e.g. Jr., Sr., I, II, III, ..." required>
              <div class="form-check mt-1">
                <input class="form-check-input" type="checkbox" id="noSuffix">
                <label class="form-check-label" for="noSuffix">No Suffix</label>
              </div>
            </div>
            <div class="col-md-3">
              <label class="form-label fw-semibold">Email Address</label>
              <input type="email" class="form-control" name="email" placeholder="e.g. pnpki@gmail.com" required>
            </div>
            <div class="col-md-3">
              <label for="contact" class="form-label fw-semibold">Contact Number</label>
              <input type="text" class="form-control" id="contact" name="contact" placeholder="09 or 639*********" inputmode="numeric" pattern="^\d{7,12}$" maxlength="12" title="Numbers only. Mobile: 11 digits (09...) or 12 digits (639...). Landline: 7–10 digits." required autocomplete="tel">
              <div class="invalid-feedback">
                Please enter a valid Mobile (09xxx or 639xxx) or Landline (7-10 digits).
              </div>
            </div>
            <div class="col-md-3">
              <label class="form-label fw-semibold">Gender</label>
              <select class="form-select" name="gender" required>
                <option value="" selected disabled>Select Sector...</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
              </select>
            </div>
          </div>
          
          <div class="row g-3 mt-2">
             <div class="col-md-8">
              <label class="form-label fw-semibold">Agency</label>
                <select name="agency" id="agency" class="form-select" style="width: 100%;" required disabled>
                  <option value="" selected disabled>Select Sector First...</option>
                </select>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">File Upload</label>
              <input type="file" class="form-control" id="fileInput" accept="*/*" required>
            </div>
          </div>

        </form>
      </div>

      <div class="modal-footer bg-white p-3">
        <button type="button" class="btn btn-outline-secondary rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary rounded-pill px-4" onclick="handleFormSubmit('')">Save Application</button>
      </div>
    </div>
  </div>
</div>
