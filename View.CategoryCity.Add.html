<!-- Add City modal: included by View.Category.Index -->
<div class="modal fade" id="addCityModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow">
      <div class="modal-header border-0">
        <h5 class="modal-title fw-bold">New City</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="addCityForm">
          <div class="mb-3">
            <label class="form-label fw-semibold">Domain</label>
            <select class="form-select" id="newCityDomainSelect" onchange="onAddCityDomainChange()" required>
              <option value="" disabled selected>Select Domain...</option>
              <option value="015">015</option>
              <option value="017">017</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Province</label>
            <select class="form-select" id="newCityProvinceSelect" onchange="toggleNewProvinceFields('add')" required disabled>
              <option value="" disabled selected>Select Domain first...</option>
              <option value="__NEW__">— New Province —</option>
            </select>
          </div>
          <div id="newProvinceFieldsAdd" class="d-none mb-3">
            <label class="form-label fw-semibold">New Province Code</label>
            <input type="text" class="form-control mb-2" id="newCityProvinceCode" placeholder="e.g. A">
            <label class="form-label fw-semibold">New Province Name</label>
            <input type="text" class="form-control" id="newCityProvinceName" placeholder="e.g. South Cotabato">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">City / Municipality</label>
            <input type="text" class="form-control" id="newCityName" placeholder="City or municipality name" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">District</label>
            <input type="text" class="form-control" id="newCityDistrict" placeholder="e.g. 1st District">
          </div>
        </form>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-secondary rounded-pill px-3" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary rounded-pill px-3" id="addCitySubmitBtn" onclick="submitAddCity()">Save City</button>
      </div>
    </div>
  </div>
</div>
