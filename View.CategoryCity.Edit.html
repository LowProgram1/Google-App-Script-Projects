<!-- Edit City modal: included by View.Category.Index -->
<div class="modal fade" id="editCityModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow">
      <div class="modal-header border-0">
        <h5 class="modal-title fw-bold">Edit City</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="editCityForm">
          <input type="hidden" id="editCityOldDomain" value="">
          <input type="hidden" id="editCityOldProvinceCode" value="">
          <input type="hidden" id="editCityOldCityName" value="">
          <div class="mb-3">
            <label class="form-label fw-semibold">Domain</label>
            <select class="form-select" id="editCityDomainSelect" onchange="onEditCityDomainChange()" required>
              <option value="">Select Domain...</option>
              <option value="015">015</option>
              <option value="017">017</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Province</label>
            <select class="form-select" id="editCityProvinceSelect" onchange="toggleNewProvinceFields('edit')" required disabled>
              <option value="" disabled>Select Province...</option>
              <option value="__NEW__">— New Province —</option>
            </select>
          </div>
          <div id="newProvinceFieldsEdit" class="d-none mb-3">
            <label class="form-label fw-semibold">Province Code</label>
            <input type="text" class="form-control mb-2" id="editCityProvinceCode" placeholder="e.g. A">
            <label class="form-label fw-semibold">Province Name</label>
            <input type="text" class="form-control" id="editCityProvinceName" placeholder="e.g. South Cotabato">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">City / Municipality</label>
            <input type="text" class="form-control" id="editCityName" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">District</label>
            <input type="text" class="form-control" id="editCityDistrict" placeholder="e.g. 1st District">
          </div>
        </form>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-secondary rounded-pill px-3" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary rounded-pill px-3" id="editCitySubmitBtn" onclick="submitEditCity()">Update City</button>
      </div>
    </div>
  </div>
</div>
