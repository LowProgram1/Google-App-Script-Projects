<div class="animate-fade-in">
  <h3 class="fw-bold m-0 text-dark page-title mb-4">Table Management</h3>

  <div class="glass-card mb-4">
    <h5 class="fw-bold text-dark mb-3"><i class="bi bi-plus-circle me-2 text-primary"></i>Generate New Table</h5>
    <div class="menu-generate-row d-flex flex-wrap align-items-end gap-3">
      <div class="menu-generate-field" style="min-width: 140px;">
        <label class="form-label small text-muted mb-1">Year</label>
        <input type="number" id="menuYearInput" class="form-control" placeholder="e.g. 2026" min="2020" max="2100" value="">
      </div>
      <div class="menu-generate-field" style="min-width: 180px;">
        <label class="form-label small text-muted mb-1">Display Label</label>
        <input type="text" id="menuDisplayLabelInput" class="form-control" placeholder="e.g. 2026" value="">
      </div>
      <button type="button" class="btn btn-primary rounded-pill px-4" id="menuGenerateBtn" onclick="generateYearlyTable()">
        <i class="bi bi-plus-lg me-2"></i>Generate Table
      </button>
    </div>
    <div id="menuGenerateMessage" class="mt-2 small"></div>
  </div>

  <div class="glass-card p-0 overflow-hidden" style="border: 1px solid #e2e8f0;">
    <div class="px-3 py-2 border-bottom border-light bg-light d-flex justify-content-between align-items-center">
      <h6 class="fw-bold text-dark m-0"><i class="bi bi-table me-2 text-primary"></i>Yearly Tables</h6>
    </div>
    <div class="table-responsive">
      <table id="menuManageTable" class="table table-hover nowrap w-100" style="margin-top: 0 !important;">
        <thead class="bg-dark text-white">
          <tr>
            <th class="text-center" style="width: 80px;">ID</th>
            <th>Table Name</th>
            <th>Year</th>
            <th>Display Label</th>
            <th>Created At</th>
            <th class="text-center">Status</th>
            <th class="text-center">Action</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal fade" id="menuEditLabelModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content border-0 shadow-lg">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title fw-bold"><i class="bi bi-pencil-square me-2"></i>Edit Display Label</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="menuEditUniqueId">
        <label class="form-label fw-semibold">Display Label</label>
        <input type="text" id="menuEditDisplayLabel" class="form-control" placeholder="e.g. 2026 Application Tracker">
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary rounded-pill" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary rounded-pill" id="menuEditSaveBtn" onclick="saveMenuEditLabel()">Save</button>
      </div>
    </div>
  </div>
</div>
